name: Verify Production Contract

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:

jobs:
  verify-production-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify live production contract
        run: node scripts/verify-live-contract.mjs https://yourworldpaintingny.com
